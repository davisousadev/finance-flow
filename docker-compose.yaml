version: '3.8'

services:
  database:
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    container_name: finance-flow-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: finance_flow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: finance-flow-api
    environment:
      DATABASE_URL: postgresql://postgres:123456@database:5432/finance_flow
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./packages/database/migrations:/app/packages/database/migrations
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: finance-flow-web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
